<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-light bg-light">
            <span class="navbar-brand">MiniMarket</span>
            <span id="badge" class="badge bg-primary">0</span>
        </nav>
    </header>

    <main>
        <div class="container text-center mt-4">

            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-3">
                <div class="col">
                    <div class="card p-3">
                        <h2>Cama elevada para perros</h2>
                        <img src="https://http2.mlstatic.com/D_NQ_NP_940406-MLU76877832742_062024-O.webp" alt="Cama elevada para perros">
                        <p class="precio">222.990</p>
                        <button class="btn btn-info btn-agregar" data-nombre="Cama elevada para perros" data-precio="222990">
                            Añadir al carrito
                        </button>
                    </div>
                </div>

                <div class="col">
                    <div class="card p-3">
                        <h2>Pañitos húmedos para mascotas</h2>
                        <img src="https://www.supermarpet.co/cdn/shop/products/pan__os-humedos-petys-12x50_large.png?v=1654379161" alt="Pañitos húmedos para mascotas">
                        <p class="precio">12.719</p>
                        <button class="btn btn-info btn-agregar" data-nombre="Pañitos húmedos para mascotas" data-precio="12719">
                            Añadir al carrito
                        </button>
                    </div>
                </div>

                <div class="col">
                    <div class="card p-3">
                        <h2>Pelota interactiva para mascotas</h2>
                        <img src="https://http2.mlstatic.com/D_NQ_NP_793455-CBT93484520027_092025-O.webp" alt="Pelota interactiva para mascotas">
                        <p class="precio">26.247</p>
                        <button class="btn btn-info btn-agregar" data-nombre="Pelota interactiva para mascotas" data-precio="26247">
                            Añadir al carrito
                        </button>
                    </div>
                </div>

                <div class="col">
                    <div class="card p-3">
                        <h2 class="data-nombre">Enjuague bucal para mascotas</h2>
                        <img src="https://static.laika.digital/products-3/d2c789804546117a6dea38ea16bba98a_1712611817.jpg" alt="Enjuague bucal para mascotas">
                        <p class="data-precio">15.390</p>
                        <button class="btn btn-info btn-agregar" data-nombre="Enjuague bucal para mascotas" data-precio="15390">
                            Añadir al carrito
                        </button>
                    </div>
                </div>
            </div>
            
            <section id="Carrito">
                <h4>Carrito</h4>
                <ul id="lista-carrito">
                    <li id="msg-vacio">Tu carrito está vacío</li>
                </ul>
                <p>Total: <span id="total">$0</span></p>
                <button id="btn-vaciar">
                    Vaciar Carrito
                </button>
            </section>
        </div>
    </main>
    <script src="app.js"></script>
</body>

</html>
